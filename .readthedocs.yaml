version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    - sphinx-apidoc -o docs/api src/armodel --force --separate
    - sphinx-build docs docs/_build/html

python:
  install:
    - method: pip
      path: .
      extra_requirements: []
    - method: pip
      path: docs
      requirements: requirements.txt
